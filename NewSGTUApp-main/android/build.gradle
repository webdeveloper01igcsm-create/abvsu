// Top-level build file where you can add configuration options common to all sub-projects/modules.
import groovy.json.JsonSlurper

def resolveReactNativeVersion() {
  def packageJson = new File(rootDir.parentFile, "package.json")
  if (!packageJson.exists()) {
    return null
  }

  def dependencies = new JsonSlurper().parseText(packageJson.text)?.dependencies
  def version = dependencies?.get("react-native")
  if (version instanceof String && !version.trim().isEmpty()) {
    return version
  }

  return null
}

def reactNativeMavenVersion = resolveReactNativeVersion()

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath 'com.google.gms:google-services:4.4.1'
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }

  if (reactNativeMavenVersion != null) {
    configurations.configureEach {
      resolutionStrategy.eachDependency { details ->
        if (details.requested.group == "com.facebook.react" &&
            (details.requested.version == null || details.requested.version.trim().isEmpty())) {
          details.useVersion(reactNativeMavenVersion)
        }
      }
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
